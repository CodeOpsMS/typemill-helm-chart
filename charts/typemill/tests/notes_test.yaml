suite: NOTES.txt tests
templates:
  - templates/NOTES.txt
release:
  name: test-release
  namespace: test-ns
tests:
  - it: should show ingress URL when ingress is enabled
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: typemill.example.com
          paths:
            - path: /
              pathType: ImplementationSpecific
    asserts:
      - matchRegexRaw:
          pattern: "http://typemill.example.com"

  - it: should show https URL when TLS is configured
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: typemill.example.com
          paths:
            - path: /
              pathType: ImplementationSpecific
      ingress.tls:
        - secretName: typemill-tls
          hosts:
            - typemill.example.com
    asserts:
      - matchRegexRaw:
          pattern: "https://typemill.example.com"

  - it: should show port-forward instructions when ingress is disabled
    set:
      ingress.enabled: false
    asserts:
      - matchRegexRaw:
          pattern: "kubectl port-forward"

  - it: should show correct service name in port-forward command
    set:
      ingress.enabled: false
      service.port: 80
    asserts:
      - matchRegexRaw:
          pattern: "svc/test-release-typemill"

  - it: should always show setup instructions
    asserts:
      - matchRegexRaw:
          pattern: "/tm/setup"
