suite: helpers tests
templates:
  - templates/service.yaml
release:
  name: test-release
  namespace: test-ns
chart:
  version: 1.0.0
  appVersion: 2.21.2
tests:
  - it: should generate correct fullname
    asserts:
      - equal:
          path: metadata.name
          value: test-release-typemill

  - it: should use fullnameOverride when set
    set:
      fullnameOverride: my-custom-typemill
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-typemill

  - it: should have correct common labels
    asserts:
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: typemill
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: test-release
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  - it: should truncate long names to 63 characters
    release:
      name: a-very-long-release-name-that-is-quite-lengthy
    set:
      nameOverride: an-also-very-long-name-override-for-testing-trunc
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: "^.{1,63}$"

  - it: should use nameOverride in name component
    set:
      nameOverride: my-app
    asserts:
      - equal:
          path: metadata.name
          value: test-release-my-app

  - it: should use release name when it contains chart name
    release:
      name: typemill
    asserts:
      - equal:
          path: metadata.name
          value: typemill
