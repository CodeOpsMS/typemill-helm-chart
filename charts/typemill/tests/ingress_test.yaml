suite: ingress tests
templates:
  - templates/ingress.yaml
release:
  name: test-release
  namespace: test-ns
tests:
  - it: should not render ingress when disabled
    set:
      ingress.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ingress when enabled
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: typemill.example.com
          paths:
            - path: /
              pathType: ImplementationSpecific
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: apiVersion
          value: networking.k8s.io/v1

  - it: should set ingressClassName when specified
    set:
      ingress.enabled: true
      ingress.className: nginx
      ingress.hosts:
        - host: typemill.example.com
          paths:
            - path: /
              pathType: ImplementationSpecific
    asserts:
      - equal:
          path: spec.ingressClassName
          value: nginx

  - it: should not set ingressClassName when empty
    set:
      ingress.enabled: true
      ingress.className: ""
      ingress.hosts:
        - host: typemill.example.com
          paths:
            - path: /
              pathType: ImplementationSpecific
    asserts:
      - notExists:
          path: spec.ingressClassName

  - it: should configure TLS when specified
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: typemill.example.com
          paths:
            - path: /
              pathType: ImplementationSpecific
      ingress.tls:
        - secretName: typemill-tls
          hosts:
            - typemill.example.com
    asserts:
      - equal:
          path: spec.tls[0].secretName
          value: typemill-tls
      - contains:
          path: spec.tls[0].hosts
          content: typemill.example.com

  - it: should set annotations when specified
    set:
      ingress.enabled: true
      ingress.annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: "100m"
      ingress.hosts:
        - host: typemill.example.com
          paths:
            - path: /
              pathType: ImplementationSpecific
    asserts:
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/proxy-body-size"]
          value: "100m"

  - it: should have correct host and path
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: docs.example.com
          paths:
            - path: /wiki
              pathType: Prefix
    asserts:
      - equal:
          path: spec.rules[0].host
          value: docs.example.com
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /wiki
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: Prefix

  - it: should support multiple hosts
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: typemill.example.com
          paths:
            - path: /
              pathType: ImplementationSpecific
        - host: docs.example.com
          paths:
            - path: /
              pathType: ImplementationSpecific
    asserts:
      - equal:
          path: spec.rules[0].host
          value: typemill.example.com
      - equal:
          path: spec.rules[1].host
          value: docs.example.com

  - it: should support multiple paths per host
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: typemill.example.com
          paths:
            - path: /
              pathType: ImplementationSpecific
            - path: /api
              pathType: Prefix
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /
      - equal:
          path: spec.rules[0].http.paths[1].path
          value: /api
      - equal:
          path: spec.rules[0].http.paths[1].pathType
          value: Prefix

  - it: should set correct backend service port
    set:
      ingress.enabled: true
      service.port: 8080
      ingress.hosts:
        - host: typemill.example.com
          paths:
            - path: /
              pathType: ImplementationSpecific
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 8080

  - it: should set correct backend service name
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: typemill.example.com
          paths:
            - path: /
              pathType: ImplementationSpecific
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: test-release-typemill

  - it: should have correct labels
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: typemill.example.com
          paths:
            - path: /
              pathType: ImplementationSpecific
    asserts:
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: typemill
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: test-release
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
