suite: persistentvolumeclaim tests
templates:
  - templates/persistentvolumeclaim.yaml
release:
  name: test-release
  namespace: test-ns
tests:
  - it: should create PVC when persistence is enabled
    set:
      persistence.enabled: true
      persistence.existingClaim: ""
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: spec.accessModes[0]
          value: ReadWriteOnce
      - equal:
          path: spec.resources.requests.storage
          value: 5Gi

  - it: should not create PVC when persistence is disabled
    set:
      persistence.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create PVC when existingClaim is set
    set:
      persistence.enabled: true
      persistence.existingClaim: my-existing-pvc
    asserts:
      - hasDocuments:
          count: 0

  - it: should use custom storage size
    set:
      persistence.enabled: true
      persistence.existingClaim: ""
      persistence.size: 20Gi
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 20Gi

  - it: should set storageClassName when specified
    set:
      persistence.enabled: true
      persistence.existingClaim: ""
      persistence.storageClass: longhorn
    asserts:
      - equal:
          path: spec.storageClassName
          value: longhorn

  - it: should not set storageClassName when empty
    set:
      persistence.enabled: true
      persistence.existingClaim: ""
      persistence.storageClass: ""
    asserts:
      - notExists:
          path: spec.storageClassName

  - it: should use ReadWriteMany access mode when configured
    set:
      persistence.enabled: true
      persistence.existingClaim: ""
      persistence.accessMode: ReadWriteMany
    asserts:
      - equal:
          path: spec.accessModes[0]
          value: ReadWriteMany

  - it: should have correct labels
    set:
      persistence.enabled: true
      persistence.existingClaim: ""
    asserts:
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: typemill
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: test-release
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  - it: should have correct name
    set:
      persistence.enabled: true
      persistence.existingClaim: ""
    asserts:
      - equal:
          path: metadata.name
          value: test-release-typemill
