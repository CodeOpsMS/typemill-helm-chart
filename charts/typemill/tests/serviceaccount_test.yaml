suite: serviceaccount tests
templates:
  - templates/serviceaccount.yaml
release:
  name: test-release
  namespace: test-ns
tests:
  - it: should create serviceaccount when enabled
    set:
      serviceAccount.create: true
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: test-release-typemill

  - it: should not create serviceaccount when disabled
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use custom name when specified
    set:
      serviceAccount.create: true
      serviceAccount.name: my-custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-sa

  - it: should set annotations when specified
    set:
      serviceAccount.create: true
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/my-role
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::123456789:role/my-role"

  - it: should not have annotations when empty
    set:
      serviceAccount.create: true
      serviceAccount.annotations: {}
    asserts:
      - notExists:
          path: metadata.annotations

  - it: should have correct labels
    set:
      serviceAccount.create: true
    asserts:
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: typemill
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: test-release
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  - it: should disable automountServiceAccountToken by default
    set:
      serviceAccount.create: true
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: should enable automountServiceAccountToken when set
    set:
      serviceAccount.create: true
      serviceAccount.automountServiceAccountToken: true
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: true
