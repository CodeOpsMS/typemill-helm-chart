name: Release Helm Charts

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: latest

      - name: Run chart-releaser (GitHub Pages)
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          charts_dir: charts


      - name: Publish GitHub Pages landing page
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          cleanup() {
            git worktree remove --force "$tmpdir" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          git fetch origin gh-pages
          git worktree add "$tmpdir" origin/gh-pages
          cat > "$tmpdir/index.html" <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Typemill Helm Chart Repository</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 760px; margin: 3rem auto; padding: 0 1rem; line-height: 1.5; }
              code { background: #f3f4f6; padding: .15rem .3rem; border-radius: .25rem; }
            </style>
          </head>
          <body>
            <h1>Typemill Helm Chart Repository</h1>
            <p>This GitHub Pages site hosts the Helm repository index for the Typemill chart.</p>
            <h2>Usage</h2>
            <pre><code>helm repo add typemill https://codeopsms.github.io/typemill-helm-chart/
          helm repo update
          helm install my-typemill typemill/typemill</code></pre>
            <p>Repository index: <a href="index.yaml">index.yaml</a></p>
            <p>Source: <a href="https://github.com/CodeOpsMS/typemill-helm-chart">CodeOpsMS/typemill-helm-chart</a></p>
          </body>
          </html>
          HTML
          cd "$tmpdir"
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          if ! git diff --quiet -- index.html; then
            git add index.html
            git commit -m "Add GitHub Pages landing page"
            git push origin HEAD:gh-pages
          fi
          cd -

      - name: Push Helm Chart to GHCR as OCI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

          CHART_VERSION=$(grep '^version:' charts/typemill/Chart.yaml | awk '{print $2}')

          helm package charts/typemill --destination /tmp

          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm push /tmp/typemill-${CHART_VERSION}.tgz oci://ghcr.io/${OWNER}/helm-charts
